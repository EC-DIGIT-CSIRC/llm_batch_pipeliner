name: Ruff
on:
  push:
    branches: [main]
    paths: ["src/**/*.py", "tests/**/*.py", ".github/workflows/ruff.yml"]
  pull_request:
    paths: ["src/**/*.py", "tests/**/*.py", ".github/workflows/ruff.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check . --respect-gitignore
