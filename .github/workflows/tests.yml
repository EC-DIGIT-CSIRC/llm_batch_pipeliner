name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "tests/fixtures/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - "tests/fixtures/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --group dev
      - run: uv run pytest -m unit

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --group dev
      - run: uv run pytest -m integration

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv sync --group dev
      - run: uv run pytest -m e2e
